services:
  - type: web
    name: realtime-testing-dashboard-api
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realtime-testing-dashboard-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://your-vercel-project.vercel.app
      - key: AUTO_CREATE_SCHEMA
        value: "false"
databases:
  - name: realtime-testing-dashboard-db
    plan: free
